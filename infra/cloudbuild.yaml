# Cloud Build pipeline for the GemmaPlay backend.
#
# Trigger: push to main (configure in Cloud Build console) or manual:
#   gcloud builds submit --config=infra/cloudbuild.yaml .
#
# Substitutions (set at trigger level or via --substitutions):
#   _REGION           (default: us-central1)
#   _SERVICE          (default: gemmaplay-api)
#   _VERTEX_MODEL_ID  (default: gemma-4-26b-a4b-it-maas)

steps:
  # 1. Build image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/gemmaplay/${_SERVICE}:$SHORT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/gemmaplay/${_SERVICE}:latest'
      - '-f'
      - 'backend/Dockerfile'
      - 'backend'

  # 2. Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/gemmaplay/${_SERVICE}'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/gemmaplay/${_SERVICE}:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=120'
      - '--max-instances=3'
      - '--set-env-vars=APP_ENV=production,GEMMA_PROVIDER=vertex,GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=${_REGION},VERTEX_MODEL_ID=${_VERTEX_MODEL_ID},STORAGE_BACKEND=gcs,GCS_BUCKET=$PROJECT_ID-gemmaplay'
      - '--set-secrets=SESSION_JWT_SECRET=gemmaplay-session-jwt:latest'

substitutions:
  _REGION: us-central1
  _SERVICE: gemmaplay-api
  _VERTEX_MODEL_ID: gemma-4-26b-a4b-it-maas

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/gemmaplay/${_SERVICE}:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/gemmaplay/${_SERVICE}:latest'
